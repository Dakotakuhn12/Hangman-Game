<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman Game</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./styles/style.css" />

    <style>
      .home-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding: 20px 24px;
        background: var(--surface);
        color: var(--text);
      }

      .home-main {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        width: 100%;
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 0;
      }

      .home-heading {
        display: grid;
        gap: 10px;
        text-align: center;
      }

      .home-heading p {
        max-width: 620px;
        color: var(--muted);
        font-size: 1.05rem;
        font-weight: 600;
        line-height: 1.5;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        width: 100%;
      }

      .mode-link {
        display: flex;
        min-height: 170px;
        flex-direction: column;
        justify-content: space-between;
        gap: 18px;
        padding: 22px;
        border: 1px solid var(--border-strong);
        border-radius: 12px;
        background: linear-gradient(
          180deg,
          var(--surface-panel-start) 0%,
          var(--surface-panel-end) 100%
        );
        color: var(--text);
        text-align: left;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(67, 97, 238, 0.08);
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .mode-link:hover {
        transform: translateY(-3px);
        border-color: var(--primary);
        box-shadow: var(--shadow);
      }

      .mode-link i {
        color: var(--primary);
        font-size: 1.5rem;
      }

      .mode-link span {
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.4;
      }

      .mode-link strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1.2rem;
        color: var(--text);
      }

      @media (max-width: 780px) {
        .mode-grid {
          grid-template-columns: 1fr;
        }

        .home-container {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="home-container">
      <header class="page-header">
        <h1>Hangman Game</h1>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-label="Toggle dark mode"
        >
          <i class="fas fa-moon"></i>
          <span id="theme-toggle-text">Dark Mode</span>
        </button>
      </header>

      <main class="home-main">
        <div class="home-heading">
          <h2>Choose Your Game Mode</h2>
          <p>
            Practice solo, race a bot, or jump into a multiplayer room with
            friends.
          </p>
        </div>

        <div class="mode-grid">
          <a class="mode-link" href="./pages/hangman.html">
            <i class="fas fa-user"></i>
            <div>
              <strong>Single Player</strong>
              <span>Play classic Hangman with scoring and leaderboards.</span>
            </div>
          </a>

          <a class="mode-link" href="./pages/hangmanQuickPlay.html">
            <i class="fas fa-robot"></i>
            <div>
              <strong>Quick Play</strong>
              <span>Face off against the bot in a faster round.</span>
            </div>
          </a>

          <a class="mode-link" href="./pages/hangmanMultiplayer.html">
            <i class="fas fa-users"></i>
            <div>
              <strong>Multiplayer</strong>
              <span>Create or join a room and play together live.</span>
            </div>
          </a>
        </div>
      </main>
    </div>

    <script>
      const themeToggle = document.getElementById("theme-toggle");
      const themeToggleText = document.getElementById("theme-toggle-text");
      const themeToggleIcon = themeToggle?.querySelector("i");

      function applyTheme(theme) {
        const resolvedTheme = theme === "dark" ? "dark" : "light";

        document.documentElement.setAttribute("data-theme", resolvedTheme);

        if (themeToggleText) {
          themeToggleText.textContent =
            resolvedTheme === "dark" ? "Light Mode" : "Dark Mode";
        }

        if (themeToggleIcon) {
          themeToggleIcon.className =
            resolvedTheme === "dark" ? "fas fa-sun" : "fas fa-moon";
        }

        if (themeToggle) {
          themeToggle.setAttribute(
            "aria-label",
            resolvedTheme === "dark"
              ? "Switch to light mode"
              : "Switch to dark mode",
          );
        }
      }

      const savedTheme = localStorage.getItem("hangmanTheme");
      const preferredTheme =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";

      applyTheme(savedTheme || preferredTheme);

      themeToggle?.addEventListener("click", () => {
        const nextTheme =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark";

        localStorage.setItem("hangmanTheme", nextTheme);
        applyTheme(nextTheme);
      });
    </script>
  </body>
</html>
